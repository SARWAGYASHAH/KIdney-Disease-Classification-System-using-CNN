<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Test Page</title>

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            color: #00ffcc;
        }

        p {
            font-size: 18px;
        }

        button {
            background-color: #00ffcc;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #00cc99;
        }
    </style>
</head>

<body>

    <h1>Dark Mode Test Page</h1>
    <p>If you can see this text clearly, your dark background is working.</p>

    <button onclick="alert('Test Successful!')">Test Button</button>

</body>

</html>
